<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="32" height="32" shape-rendering="crispEdges">
  <title>Sawalyno logo mark</title>
  <rect width="8" height="8" fill="#000000"/>
  <!-- S pixel art: row by row -->
  <!-- row 1: .XXX.. -->
  <rect x="1" y="0" width="1" height="1" fill="#5fff8f"/>
  <rect x="2" y="0" width="1" height="1" fill="#5fff8f"/>
  <rect x="3" y="0" width="1" height="1" fill="#5fff8f"/>
  <rect x="4" y="0" width="1" height="1" fill="#5fff8f"/>
  <!-- row 2: X.... -->
  <rect x="0" y="1" width="1" height="1" fill="#5fff8f"/>
  <rect x="1" y="1" width="1" height="1" fill="#5fff8f"/>
  <!-- row 3: XX... -->
  <rect x="0" y="2" width="1" height="1" fill="#5fff8f"/>
  <rect x="1" y="2" width="1" height="1" fill="#5fff8f"/>
  <!-- row 4: .XXX. -->
  <rect x="1" y="3" width="1" height="1" fill="#5fff8f"/>
  <rect x="2" y="3" width="1" height="1" fill="#5fff8f"/>
  <rect x="3" y="3" width="1" height="1" fill="#5fff8f"/>
  <!-- row 5: ...XX -->
  <rect x="3" y="4" width="1" height="1" fill="#5fff8f"/>
  <rect x="4" y="4" width="1" height="1" fill="#5fff8f"/>
  <!-- row 6: ....X -->
  <rect x="3" y="5" width="1" height="1" fill="#5fff8f"/>
  <rect x="4" y="5" width="1" height="1" fill="#5fff8f"/>
  <!-- row 7: XXX. -->
  <rect x="0" y="6" width="1" height="1" fill="#5fff8f"/>
  <rect x="1" y="6" width="1" height="1" fill="#5fff8f"/>
  <rect x="2" y="6" width="1" height="1" fill="#5fff8f"/>
  <rect x="3" y="6" width="1" height="1" fill="#5fff8f"/>
</svg>
