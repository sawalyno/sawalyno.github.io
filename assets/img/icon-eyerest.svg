<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <title>EyeRest</title>
  <rect width="64" height="64" fill="#0a0a0a" rx="12"/>
  <!-- Eye outline -->
  <ellipse cx="32" cy="32" rx="20" ry="12" fill="none" stroke="#5fff8f" stroke-width="2"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="6" fill="#5fff8f" opacity="0.8"/>
  <circle cx="32" cy="32" r="3" fill="#000"/>
  <!-- Eyelashes top -->
  <line x1="32" y1="18" x2="32" y2="14" stroke="#5fff8f" stroke-width="1.5"/>
  <line x1="40" y1="21" x2="42" y2="17" stroke="#5fff8f" stroke-width="1.5"/>
  <line x1="24" y1="21" x2="22" y2="17" stroke="#5fff8f" stroke-width="1.5"/>
</svg>
