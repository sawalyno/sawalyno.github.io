<style>
  #not-found {
    min-height: calc(100vh - 72px);
    display: flex;

    padding: 48px 24px;

<div class="scanlines" aria-hidden="true"></div>

          <pre class="terminal-lines" lang="en">
            <span class="terminal-line prompt-line visible" style="display:block">$ cd ./that-page</span>
            <span class="terminal-line output-line visible" style="display:block">bash: cd: ./that-page: No such file or directory</span>
            <span class="terminal-line prompt-line visible" style="display:block">$ ./go-home</span>
          </pre>
        </div>
      </div>
      <div class="hero-cta">
        <a href="/" class="btn-bevel">Back to /</a>
      </div>
    </div>
  </section>
</main>

<footer id="taskbar">
  <div class="start-btn" aria-hidden="true">
    <img class="start-icon" src="/assets/img/logo-mark.svg" alt="" width="16" height="16">
